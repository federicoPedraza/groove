name: build-desktop

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run frontend typecheck
        run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system deps for Tauri checks
        run: |
          PACKAGES=$(node -e "
            const d = require('./scripts/linux-deps.json');
            const libs = d.required_libraries.map(l => l.packages.apt).filter(Boolean);
            const tools = d.build_toolchains.packages.apt || [];
            console.log([...tools, ...libs].join(' '));
          ")
          sudo apt-get update
          sudo apt-get install -y $PACKAGES

      - name: Verify system deps
        run: ./scripts/check-linux-deps

      - name: Run Rust check
        run: npm run check:rust

  setup-linux-distros:
    name: Setup (${{ matrix.distro }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu
            image: ubuntu:24.04
            pre_install: "apt-get update && apt-get install -y curl"
          - distro: arch
            image: archlinux:latest
            pre_install: "pacman -Sy --noconfirm curl"
          - distro: fedora
            image: fedora:41
            pre_install: "dnf install -y curl"
    container:
      image: ${{ matrix.image }}

    steps:
      - name: Install container prerequisites
        run: ${{ matrix.pre_install }}

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install system deps via setup script
        run: |
          # The setup script calls read_packages_for which needs node + linux-deps.json.
          # We only test the system dep installation part, not the full setup.
          node -e "
            const d = require('./scripts/linux-deps.json');
            const pm = process.argv[1];
            const libs = d.required_libraries.map(l => l.packages[pm]).filter(Boolean);
            const tools = d.build_toolchains.packages[pm] || [];
            console.log([...tools, ...libs].join('\n'));
          " "${{ matrix.distro == 'ubuntu' && 'apt' || matrix.distro == 'arch' && 'pacman' || 'dnf' }}" > /tmp/packages.txt
          cat /tmp/packages.txt

          case "${{ matrix.distro }}" in
            ubuntu)
              apt-get update
              xargs apt-get install -y < /tmp/packages.txt
              ;;
            arch)
              xargs pacman -Syu --needed --noconfirm < /tmp/packages.txt
              ;;
            fedora)
              xargs dnf install -y < /tmp/packages.txt
              ;;
          esac

      - name: Verify system deps are present
        run: ./scripts/check-linux-deps

  build:
    name: Build (${{ matrix.os }})
    needs: [lint, typecheck, test, rust-check]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download Linux sidecars
        if: runner.os == 'Linux'
        env:
          GH_TOKEN: ${{ github.token }}
          GROOVE_SIDECAR_REPO: ${{ vars.GROOVE_SIDECAR_REPO }}
          GROOVE_SIDECAR_TAG: ${{ vars.GROOVE_SIDECAR_TAG }}
        run: ./scripts/download-sidecars-from-release linux

      - name: Download macOS sidecars
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ github.token }}
          GROOVE_SIDECAR_REPO: ${{ vars.GROOVE_SIDECAR_REPO }}
          GROOVE_SIDECAR_TAG: ${{ vars.GROOVE_SIDECAR_TAG }}
        run: ./scripts/download-sidecars-from-release macos

      - name: Linux setup
        if: runner.os == 'Linux'
        run: ./scripts/setup-linux-fast

      - name: macOS setup
        if: runner.os == 'macOS'
        run: ./scripts/setup-macos-fast

      - name: Build Linux bundles
        if: runner.os == 'Linux'
        run: npm run tauri:build:linux

      - name: Build macOS bundles
        if: runner.os == 'macOS'
        run: npm run tauri:build:macos

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: groove-${{ runner.os }}
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error
